name: CI

on:
  push:
    branches: [ master ]
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Fast feedback: checkstyle gate + unit tests. Mirrors the local pre-push
  # gate `mvn clean verify`.
  verify:
    name: Build & test (JVM)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: mvn clean verify
        run: mvn -B clean verify

  # Native image build. Uses an in-container Mandrel builder so the runner does
  # not need a local GraalVM. Heavier than the JVM job (~10 min incl. the
  # builder image pull), so it runs in parallel and does not gate `verify`.
  native:
    name: Build native image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: mvn -Pnative clean verify (container build)
        run: mvn -B -Pnative clean verify -Dquarkus.native.container-build=true
