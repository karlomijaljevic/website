# Custom application options
application.cache-control=public, max-age=0, must-revalidate
application.blogs-directory=blogs
application.images-directory=static/images
application.visitors-file=data/visitors.properties
application.visitors.unique-window=24h
application.visitors.cleanup-interval=0 0 */1 ? * *
application.css=static/style.min.css
application.javascript=static/script.min.js

# Packaging options
quarkus.package.jar.add-runner-suffix=false

# Disable devservices
quarkus.devservices.enabled=false

# Markdown render cache
quarkus.cache.caffeine."blog-html".maximum-size=100
quarkus.cache.caffeine."blog-html".expire-after-access=4h

# HTTP options
quarkus.http.port=8080
quarkus.http.proxy.proxy-address-forwarding=true
# Only honour forwarding headers (X-Forwarded-For, etc.) from trusted upstream
# proxies, so clients cannot spoof their address and inflate visit counts.
# Defaults to IPv4 loopback (reverse proxy co-located with the app); override
# per deployment via the TRUSTED_PROXIES env var (comma-separated proxy IPs).
# Quarkus takes the first X-Forwarded-For entry, so the fronting proxy must
# emit a clean client IP there. In the Cloudflare -> Nginx(localhost) -> app
# deployment, Nginx is responsible for that via the real_ip module
# (set_real_ip_from <cloudflare ranges>; real_ip_header CF-Connecting-IP;).
quarkus.http.proxy.trusted-proxies=${TRUSTED_PROXIES:127.0.0.1}
quarkus.http.header."Server".path=/*
quarkus.http.header."Server".value=Potato
quarkus.http.header."Host".path=/*
quarkus.http.header."Host".value=Me
quarkus.http.header."X-Powered-By".path=/*
quarkus.http.header."X-Powered-By".value=Potato
quarkus.http.header."From".path=/*
quarkus.http.header."From".value=A lovely chap
